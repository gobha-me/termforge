name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gcc:
    name: GCC ${{ matrix.version }} (Ubuntu ${{ matrix.os }})
    runs-on: ubuntu-${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [latest]
        version: [13, 14]
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC ${{ matrix.version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.version }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=g++-${{ matrix.version }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  clang:
    name: Clang ${{ matrix.version }} (Ubuntu ${{ matrix.os }})
    runs-on: ubuntu-${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [latest]
        # 19 is the first clang whose __cpp_concepts passes libstdc++'s
        # <expected> guard — 17/18 cannot compile std::expected at all.
        version: [19, 20]
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang ${{ matrix.version }}
        # llvm.sh picks the right distro codename and repo signing setup
        # (the old hand-rolled jammy repo + apt-key broke on noble runners).
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ matrix.version }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=clang++-${{ matrix.version }}
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  asan-ubsan:
    name: ASan + UBSan (GCC, Ubuntu latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Configure (ASan + UBSan)
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=g++-14
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

  fedora:
    name: GCC (Fedora latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: fedora:latest
    steps:
      - name: Install toolchain
        # Mirror TLS hiccups are common in fresh containers; retry a few
        # times before giving up.
        run: |
          for i in 1 2 3; do
            dnf install -y gcc-c++ cmake git make && break
            echo "dnf attempt $i failed; retrying in 15s" && sleep 15
          done
          gcc --version

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure
